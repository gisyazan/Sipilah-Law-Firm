<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kelola Artikel - SIPILAH</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow mb-4 border-primary">
            <div class="d-flex justify-content-between mb-3">
                <h4 class="text-primary m-0">📝 Tulis Artikel Hukum Baru</h4>
                <a href="dashboard_admin.html" class="btn btn-secondary btn-sm">⬅ Kembali ke Dasbor</a>
            </div>
            <form onsubmit="simpanArtikel(event)" class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-bold">Judul Artikel</label>
                    <input type="text" id="judul_artikel" class="form-control" placeholder="Masukkan Judul..." required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Kategori</label>
                    <select id="kategori_artikel" class="form-select" required>
                        <option value="" disabled selected>Pilih Kategori...</option>
                        <option value="Edukasi">Edukasi</option>
                        <option value="Tips">Tips Hukum</option>
                        <option value="Berita">Berita & Perkembangan</option>
                    </select>
                </div>
                
                <!-- FITUR UPLOAD GAMBAR DITAMBAHKAN DI SINI -->
                <div class="col-md-12">
                    <label class="form-label fw-bold">Cover Artikel (Gambar)</label>
                    <input type="file" id="cover_artikel" class="form-control" accept="image/*">
                    <small class="text-muted">Opsional. Jika tidak diisi, sistem akan menggunakan gambar bawaan otomatis.</small>
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Isi Artikel</label>
                    <textarea id="konten_artikel" class="form-control" rows="5" placeholder="Tulis isi artikel di sini..." required></textarea>
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-primary px-4">Terbitkan Artikel</button>
                </div>
            </form>
        </div>

        <div class="card p-4 shadow">
            <h4>Daftar Artikel Terbit</h4>
            <table class="table table-striped mt-3">
                <thead class="table-dark">
                    <tr><th>Tanggal</th><th>Judul</th><th>Kategori</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tabel-artikel-admin">
                    <!-- Artikel akan dimuat di sini -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
