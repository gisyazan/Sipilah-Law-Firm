<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | SIPILAH</title>
    <link rel="icon" href="assets/lawyer.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card-white" style="width: 400px;">
        <h2 class="text-center mb-4 fw-bold text-dark">Daftar Akun</h2>
        <form onsubmit="prosesDaftar(event)">
            <div class="mb-3">
                <input type="text" id="reg_username" class="form-control p-2" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="email" id="reg_email" class="form-control p-2" placeholder="Email" required>
            </div>
            <div class="mb-4">
                <input type="password" id="reg_password" class="form-control p-2" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Daftar</button>
        </form>
        <p class="text-center mt-4 text-dark mb-0">
            Sudah punya akun? <a href="login.html">Login di sini</a>
        </p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
