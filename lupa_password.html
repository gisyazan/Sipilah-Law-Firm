<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password | SIPILAH</title>
    <link rel="icon" href="assets/lawyer.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card-white" style="width: 400px;">
        <div class="text-center mb-4">
            <h3 class="mt-3 fw-bold text-dark">Reset Password</h3>
            <p class="text-secondary small">Masukkan username dan email yang terdaftar untuk membuat password baru.</p>
        </div>
        <form onsubmit="resetPassword(event)">
            <div class="mb-3">
                <label class="form-label text-dark">Username</label>
                <input type="text" id="reset_user" class="form-control p-2" placeholder="Masukkan username" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-dark">Email Terdaftar</label>
                <input type="email" id="reset_email" class="form-control p-2" placeholder="Masukkan email" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-dark">Password Baru</label>
                <input type="password" id="reset_pass" class="form-control p-2" placeholder="Masukkan password baru" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Simpan Password Baru</button>
        </form>
        <p class="text-center mt-4 text-dark mb-0">
            Ingat password Anda? <a href="login.html">Login di sini</a>
        </p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
