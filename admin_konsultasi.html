<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kelola Konsultasi</title>
    <link rel="icon" href="assets/lawyer.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <div class="d-flex justify-content-between align-items-center">
                <h2>Kelola Permintaan Konsultasi</h2>
                <a href="dashboard_admin.html" class="btn btn-secondary">⬅ Kembali</a>
            </div>
            <table class="table table-striped mt-3">
                <thead class="table-primary">
                    <tr><th>Klien</th><th>Tanggal</th><th>Kasus</th><th>Status</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tabel-konsultasi">
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        function loadKonsultasi() {
            let data = JSON.parse(localStorage.getItem('riwayat_konsultasi')) || [];
            let tbody = document.getElementById('tabel-konsultasi');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Belum ada pengajuan konsultasi.</td></tr>';
                return;
            }

            data.forEach((k, i) => {
                let badge = k.status === 'DISETUJUI' ? 'bg-success' : (k.status === 'DITOLAK' ? 'bg-danger' : 'bg-warning text-dark');
                let aksi = k.status === 'MENUNGGU' 
                    ? `<button onclick="ubahStatus(${i}, 'DISETUJUI')" class='btn btn-success btn-sm'>Terima</button> 
                       <button onclick="ubahStatus(${i}, 'DITOLAK')" class='btn btn-danger btn-sm'>Tolak</button>` 
                    : `<span class='text-muted small'>Sudah Diproses</span>`;
                
                tbody.innerHTML += `<tr>
                    <td><b>${k.username}</b></td>
                    <td>${k.tanggal}</td>
                    <td>${k.kasus}</td>
                    <td><span class='badge ${badge}'>${k.status}</span></td>
                    <td>${aksi}</td>
                </tr>`;
            });
        }

        function ubahStatus(index, statusBaru) {
            let data = JSON.parse(localStorage.getItem('riwayat_konsultasi')) || [];
            data[index].status = statusBaru;
            localStorage.setItem('riwayat_konsultasi', JSON.stringify(data));
            loadKonsultasi();
        }

        document.addEventListener('DOMContentLoaded', loadKonsultasi);
    </script>
</body>
</html>
