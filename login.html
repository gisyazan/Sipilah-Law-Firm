<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SIPILAH</title>
    <link rel="icon" href="assets/lawyer.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card-white" style="width: 400px;">
        <div class="text-center mb-4">
            <img src="assets/logo.png" width="80" alt="Logo">
            <h3 class="mt-3 fw-bold text-dark">Login SIPILAH</h3>
        </div>
        <form onsubmit="prosesLogin(event)">
            <div class="mb-3">
                <label class="form-label text-dark">Username</label>
                <input type="text" id="username" class="form-control p-2" placeholder="Masukkan username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-dark">Password</label>
                <input type="password" id="password" class="form-control p-2" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Masuk</button>
        </form>
        
        <div class="d-flex justify-content-between mt-4">
            <a href="lupa_password.html" class="text-danger" style="font-size: 14px;">Lupa Password?</a>
            <a href="daftar.html" class="text-primary" style="font-size: 14px;">Daftar Akun Baru</a>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
