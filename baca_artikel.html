<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Baca Artikel - SIPILAH</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Agar paragraf yang diketik admin (enter/spasi) terbaca rapi */
        .artikel-konten {
            white-space: pre-wrap;
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: justify;
            color: #333;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <img src="assets/logo.png" width="30" height="30" class="d-inline-block align-top" alt="Logo">
                SIPILAH Law Firm
            </a>
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">⬅ Kembali</a>
        </div>
    </nav>

    <div class="container my-5" id="konten_artikel_full">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <img id="img_full" src="" class="img-fluid rounded mb-4 shadow-sm" alt="Sampul Artikel" style="width: 100%; height: 400px; object-fit: cover;">
                
                <span id="kategori_full" class="badge bg-primary mb-2 px-3 py-2"></span>
                <h1 id="judul_full" class="fw-bold mb-3 text-dark">Memuat Judul...</h1>
                <p id="tanggal_full" class="text-secondary border-bottom pb-3 mb-4">🗓️ Memuat tanggal...</p>
                
                <div id="konten_full" class="artikel-konten">
                    Memuat konten...
                </div>
                
                <div class="mt-5 border-top pt-4">
                    <a href="dashboard.html" class="btn btn-secondary px-4">⬅ Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Perintah untuk langsung memuat isi artikel saat halaman dibuka
        document.addEventListener('DOMContentLoaded', muatArtikelFull);
    </script>
</body>
</html>
