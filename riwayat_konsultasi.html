<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ajukan Konsultasi - SIPILAH</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">⚖️ SIPILAH Law Firm</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Halo, <strong class="nama-user">Klien</strong></span>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">⬅ Kembali</a>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow border-primary">
                    <div class="card-header bg-primary text-white"><h5 class="mb-0">Ajukan Baru</h5></div>
                    <div class="card-body">
                        <form id="form-konsultasi" onsubmit="ajukanKonsultasi(event)">
                            <div class="mb-3">
                                <label>Pilih Pengacara</label>
                                <select id="pengacara" class="form-select" required>
                                    <option value="" disabled selected>-- Pilih Pengacara --</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Tanggal</label>
                                <input type="date" id="tanggal" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Kasus</label>
                                <textarea id="kasus" class="form-control" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Kirim Pengajuan</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card shadow p-4">
                    <h4>Riwayat Saya</h4>
                    <table class="table table-hover mt-3">
                        <thead class="table-dark">
                            <tr><th>Tanggal</th><th>Pengacara</th><th>Kasus</th><th>Status</th></tr>
                        </thead>
                        <tbody id="tabel-riwayat">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
